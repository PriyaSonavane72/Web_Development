<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

  <!-- Bootstrap 5 CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet">
</head>

<body class="bg-info bg-opacity-10">

    <!-- ADD TO CART TOAST -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index: 11">
  <div id="cartToast" class="toast text-bg-success border-0">
    <div class="d-flex">
      <div class="toast-body">
        ✅ Product added to cart!
      </div>
      <button class="btn-close btn-close-white me-2 m-auto"
              data-bs-dismiss="toast"></button>
    </div>
  </div>
</div>
 <!-- ADMIN BUTTON -->
<div class="container my-4 text-end">
  <button class="btn btn-dark fw-bold"
          data-bs-toggle="modal"
          data-bs-target="#adminModal">
    + Add Product (Admin)
  </button>
</div>

<!-- ADMIN MODAL -->
<div class="modal fade" id="adminModal">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content rounded-4">

      <div class="modal-header bg-dark text-white">
        <h5 class="modal-title">Add Product (Admin)</h5>
        <button class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        <input type="text" class="form-control mb-3" placeholder="Product Name">
        <input type="number" class="form-control mb-3" placeholder="Price">
        <input type="file" class="form-control mb-3">
        <textarea class="form-control mb-3" placeholder="Description"></textarea>

        <button class="btn btn-dark w-100 fw-bold">
          Add Product
        </button>
      </div>

    </div>
  </div>
</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


<script>
  function showToast() {
    new bootstrap.Toast(
      document.getElementById('cartToast')
    ).show();
  }
</script>
</body>
</html>
